<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>펫 미션 시작</title>

  <script src="missions.js"></script>
  <script src="game.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #efe9dd;
      color: #222;
      min-height: 100vh;
    }

    .fixed-timer {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 50;
      padding: 7px 12px;
      border-radius: 999px;
      background: #222;
      color: white;
      font-size: 14px;
      font-weight: 900;
      min-width: 76px;
      text-align: center;
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px 18px;
    }

    .page {
      width: 100%;
      max-width: 480px;
      background: linear-gradient(180deg, #fff7e8 0%, #ffffff 55%, #f3f6ff 100%);
      border-radius: 30px;
      padding: 28px 22px 34px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.14);
      text-align: center;
    }

    .emoji {
      font-size: 64px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 30px;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
      line-height: 1.25;
    }

    .desc {
      font-size: 16px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .info {
      background: #f7f7f7;
      border-radius: 18px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 18px;
      text-align: left;
    }

    .start-btn,
    .reset-btn {
      width: 100%;
      border: none;
      border-radius: 20px;
      padding: 17px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 10px;
    }

    .start-btn {
      background: #222;
      color: white;
      box-shadow: 0 12px 26px rgba(0,0,0,0.2);
    }

    .reset-btn {
      background: #eee;
      color: #222;
    }

    .side-tab {
      position: fixed;
      right: 0;
      top: 42%;
      transform: translateY(-50%);
      background: #222;
      color: white;
      padding: 12px 8px;
      border-radius: 14px 0 0 14px;
      font-size: 13px;
      font-weight: 900;
      writing-mode: vertical-rl;
      cursor: pointer;
      z-index: 20;
    }

    .hint-mini {
      position: fixed;
      right: 0;
      top: 62%;
      transform: translateY(-50%);
      background: #6e5cff;
      color: white;
      padding: 12px 8px;
      border-radius: 14px 0 0 14px;
      font-size: 13px;
      font-weight: 900;
      writing-mode: vertical-rl;
      z-index: 20;
    }

    .panel-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 30;
      justify-content: flex-end;
    }

    .panel {
      width: 86%;
      max-width: 360px;
      height: 100%;
      background: white;
      padding: 24px 20px;
      overflow-y: auto;
    }

    .record-box {
      background: #f7f7f7;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 12px;
      font-size: 15px;
      line-height: 1.7;
    }

    .close-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px;
      background: #222;
      color: white;
      font-weight: 900;
      margin-top: 12px;
    }
  </style>
</head>

<body>

<audio id="bgm" src="petstation_bgm_upbeat.wav" loop preload="auto"></audio>

<div id="globalTimer" class="fixed-timer">
  <span style="font-size:11px; display:block; line-height:1;">
    전체 진행시간
  </span>

  <span id="timeValue">00:00</span>
</div>

<div class="side-tab" onclick="openPanel()">기록</div>

<div id="hintMini" class="hint-mini">
  힌트 2/2
</div>

<div id="panelBg" class="panel-bg" onclick="closePanel()">
  <div class="panel" onclick="event.stopPropagation()">

    <h2>📋 미션 기록</h2>

    <div id="recordContent"></div>

    <button class="close-btn" onclick="closePanel()">
      닫기
    </button>

  </div>
</div>

<div class="wrap">
  <main class="page">

    <div class="emoji">🐶🔍</div>

    <h1>
      잃어버린 반려동물을<br />
      찾아라!
    </h1>

    <p class="desc">
      사라진 강아지를 찾기 위한 탐정 미션이 시작됩니다.<br />
      지하상가 곳곳에 숨겨진 단서를 따라 이동하며 모든 미션을 완료하세요!
    </p>

    <div class="info">
      ⏱ 총 예상 시간: 약 45~60분<br />
      🎯 첫 번째 미션 제한 시간: 7분<br />
      🔍 전체 힌트 최대 횟수: 2회<br />
      📍 지하상가 이동형 탐험 미션
    </div>

    <button class="start-btn" onclick="startGame()">
      미션 시작하기 🚀
    </button>

    <button class="reset-btn" onclick="resetGame()">
      기록 초기화
    </button>

  </main>
</div>

<script>
updateGlobalTimer();
updateHintMini();
tryResumePetStationBgm();

setInterval(updateGlobalTimer, 1000);
</script>

</body>
</html>
